<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        手链的价格是：(使用v-if指令)
        <span v-if="user.level >0 && user.level <= 2">1000</span>
        <span v-else-if="user.level >2 && user.level <= 4">2000</span>
        <span v-else>3000</span>
        <br>
        手链的价格是：(使用v-show指令)
        <span v-show="user.level >0 && user.level <= 2">1000</span>
        <span v-show="user.level >2 && user.level <= 4">2000</span>
        <span v-show="user.level >=4">3000</span>
    </div>
    <script type="module">
        import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
            // 创建Vue的app通过creatapp
            createApp({
                data(){
                    return {
                        user : {
                            name : "张三",
                            level : 5
                        }
                    }
                }

            }).mount('#app');
            // 通过.mount("id选择器")挂载Vue的app
    
    </script>
</body>
</html>
