<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h1>{{msg}}</h1>
    </div>




        <!-- 引入vue，使用 ES 模块构建版本 -->
    <script type="module">
        import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js';
            createApp({
                data(){
                    return {
                        msg : "hello vue3"
                    }
                }

            }).mount("#app");
    
    </script>
</body>
</html>
